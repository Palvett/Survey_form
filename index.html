<!doctype html>
<html lang="eng">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://googleapis.com" rel="stylesheet" />

    <title>survey-form.freecodecamp.rocks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <h1 id="title">freeCodeCamp Survey Form</h1>
        <p id="description">
          <em>
            Thank you for taking the time to help us improve the platform</em
          >
        </p>
      </header>

      <div id="survey">
        <form id="survey-form">
          <div class="form-group">
            <label for="name">Name:</label>
            <input
              type="text"
              id="name"
              placeholder="Enter your name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label for="age">Age(optional):</label>
            <input type="number" id="age" placeholder="Age" required />
          </div>

          <label id="role-label" for="dropdown">Select current role:</label>
          <select id="dropdown1" name="role" required>
            <option disabled selected value="">Select an option</option>
            <option value="teacher">Teacher</option>
            <option value="admin">Administrator</option>
            <option value="student">Student</option>
            <option value="other">Other</option>
          </select>
          <br />
          <label>Would you recommend freeCodeCamp to a friend?</label>
          <br />
          <input
            type="radio"
            id="definitely"
            name="recommend"
            value="definitely"
            checked
          />
          <label for="definitely">Definitely</label>
          <br />
          <input type="radio" id="maybe" name="recommend" value="maybe" />
          <label for="maybe">Maybe</label>
          <br />
          <input type="radio" id="not-sure" name="recommend" value="not-sure" />
          <label for="not-sure">Not sure</label>
          <br />
          <br />
          <label id="feature" for="dropdown2"
            >What is your favourite feature of freeCodeCamp?</label
          >
          <select id="dropdown2" name="feature" required>
            <option disabled selected value="">Select an option</option>
            <option value="the tutors">Tutors</option>
            <option value="the Campus">Campus</option>
            <option value="clean environment">Cleanliness</option>
            <option value="classmates">Class/schoolmates</option>
            <br />
          </select>

          <div class="form-group">
            <label
              >What would you like to see improve? (check all that apply)</label
            ><br />
            <!-- Wrapping input inside label-->
            <label class="checkbox-item"
              ><input type="checkbox" value="frontend" /> Front-end
              projects</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="backend" /> Back-end
              projects</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="data" /> Data visualisation</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="challenges" /> Challenges</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="community" /> Open source
              community</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="rooms" /> Gitter help rooms</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="videos" /> Videos</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="meetups" /> City meetups</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="wiki" /> Wiki</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="forum" /> Forum</label
            ><br />
            <label class="checkbox-item"
              ><input type="checkbox" value="courses" /> Additional
              courses</label
            >
          </div>
          <br />

          <div class="form-group">
            <label>Any comments, or suggestions?</label>
            <textarea
              name="suggestions"
              placeholder="Enter your comment here"
            ></textarea>
          </div>
          <button id="button" type="submit">Submit</button>
        </form>
      </div>
    </div>
  </body>
</html>
